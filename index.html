<!DOCTYPE html>
<html lang="th" class="h-full bg-[#f4fcf7]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ร้านธนภรรุ่งเรือง - ระบบเช็ควันหมดอายุ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body class="p-4 bg-[#f4fcf7] text-[#143d28]">

    <div class="max-w-4xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-black">ร้านธนภรรุ่งเรือง</h1>
            <p class="text-lg">ระบบเช็ควันหมดอายุสินค้า</p>
        </header>

        <!-- ฟอร์มบันทึก -->
        <div class="bg-white p-6 rounded-3xl shadow-lg border-2 border-green-100 mb-8">
            <form id="productForm" class="space-y-4">
                <input type="text" id="productName" placeholder="ชื่อสินค้า..." class="w-full p-4 rounded-2xl border-2 border-green-200" required>
                <input type="date" id="productExpiry" class="w-full p-4 rounded-2xl border-2 border-green-200" required>
                <button type="submit" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-green-700">บันทึกสินค้า</button>
            </form>
        </div>

        <!-- รายการสินค้า -->
        <div id="productList" class="space-y-4">
            <!-- ข้อมูลจะแสดงที่นี่ -->
        </div>
    </div>

    <script>
        let products = JSON.parse(localStorage.getItem('myProducts')) || [];

        const form = document.getElementById('productForm');
        const list = document.getElementById('productList');

        function render() {
            list.innerHTML = '';
            products.forEach((p, index) => {
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-2xl shadow border-l-8 border-green-500 flex justify-between items-center";
                div.innerHTML = `
                    <div>
                        <div class="font-bold text-lg">${p.name}</div>
                        <div class="text-sm text-gray-500">หมดอายุ: ${p.expiry}</div>
                    </div>
                    <button onclick="deleteProduct(${index})" class="text-red-500 font-bold">ลบ</button>
                `;
                list.appendChild(div);
            });
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const newProduct = {
                name: document.getElementById('productName').value,
                expiry: document.getElementById('productExpiry').value
            };
            products.push(newProduct);
            localStorage.setItem('myProducts', JSON.stringify(products));
            form.reset();
            render();
        });

        function deleteProduct(index) {
            products.splice(index, 1);
            localStorage.setItem('myProducts', JSON.stringify(products));
            render();
        }

        render();
    </script>
</body>
</html>
